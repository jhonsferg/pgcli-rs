version: 2
updates:
  # -- Rust / Cargo ---------------------------------------------------------------
  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: America/Bogota
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - rust
    commit-message:
      prefix: "chore(deps)"
    ignore:
      # Only patch and minor updates automatically; major bumps need manual review
      - dependency-name: "*"
        update-types:
          - version-update:semver-major

  # -- GitHub Actions -------------------------------------------------------------
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
      time: "06:00"
      timezone: America/Bogota
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: "chore(ci)"
